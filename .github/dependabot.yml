version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule: { interval: "weekly", day: "monday", time: "08:00", timezone: "Europe/Warsaw" }
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
  - package-ecosystem: "docker"
    directory: "/"
    schedule: { interval: "weekly", day: "monday", time: "08:30", timezone: "Europe/Warsaw" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: { interval: "weekly", day: "monday", time: "09:00", timezone: "Europe/Warsaw" }
    open-pull-requests-limit: 3
    labels: ["dependencies", "github-actions"]
