name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  AWS_ACCOUNT_ID: "207909166461"
  AWS_ROLE_ARN: arn:aws:iam::207909166461:role/fuel-consumption-calculator-github-actions-role
  ECR_REPOSITORY: fuel-consumption-calculator
  LAMBDA_FUNCTION_NAME: fuel-consumption-calculator

jobs:
  build-scan-push-deploy:
    name: Build, scan, push and deploy Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3
      - name: Define image variables
        run: |
          echo "IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_URI_LATEST=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest" >> "$GITHUB_ENV"
      - name: Build Lambda-compatible Docker image
        run: |
          docker buildx build --platform linux/amd64 --provenance=false --sbom=false --output type=docker -t "$IMAGE_URI" -t "$IMAGE_URI_LATEST" .
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_URI }}
          format: "table"
          exit-code: 1
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
      - name: Push Docker image
        run: |
          docker push "$IMAGE_URI"
          docker push "$IMAGE_URI_LATEST"
      - name: Update Lambda function code
        run: aws lambda update-function-code --function-name "$LAMBDA_FUNCTION_NAME" --image-uri "$IMAGE_URI"
      - name: Wait for Lambda update
        run: aws lambda wait function-updated --function-name "$LAMBDA_FUNCTION_NAME"
      - name: Smoke test API
        run: |
          API_ENDPOINT=$(aws apigatewayv2 get-apis --query "Items[?Name=='fuel-consumption-calculator-api'].ApiEndpoint | [0]" --output text)
          curl --fail --show-error --silent "$API_ENDPOINT/health"
          echo
